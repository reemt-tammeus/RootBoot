<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>RootBoot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        
        <header id="top-bar" class="hidden">
            <div id="lives-container">❤️❤️❤️</div>
            <div id="score-container">Score: <span id="score">0</span></div>
        </header>

        <main id="start-screen" class="screen active">
            <div class="menu-buttons-overlay">
                <button class="btn primary-btn" id="btn-start-drill">Drill-Mode (Training)</button>
                <button class="btn secondary-btn" id="btn-start-ap">AP-Mode (Exam)</button>
            </div>
        </main>

        <main id="drill-screen" class="screen hidden">
            <div id="drill-sorting-container">
                <div class="drop-zone" data-type="noun"><span class="zone-label">Nouns</span><div class="ghost-slot-container" id="slots-noun"></div></div>
                <div class="drop-zone" data-type="verb"><span class="zone-label">Verbs</span><div class="ghost-slot-container" id="slots-verb"></div></div>
                <div class="drop-zone" data-type="adjective"><span class="zone-label">Adjectives</span><div class="ghost-slot-container" id="slots-adjective"></div></div>
                <div class="drop-zone" data-type="adverb"><span class="zone-label">Adverbs</span><div class="ghost-slot-container" id="slots-adverb"></div></div>
            </div>
            <div id="active-word-area">
                <p class="label" id="sorting-label">Ordne zu:</p>
                <h2 id="current-tap-word">---</h2>
            </div>
        </main>

        <main id="task-screen" class="screen hidden">
            <div class="text-box" id="task-display">Wird geladen...</div>
            <div class="input-section">
                <p class="label" id="task-hint">Stammwort: <strong>-</strong></p>
                <input type="text" id="task-input" class="app-input" readonly placeholder="...">
            </div>
            <div id="app-keyboard" class="keyboard"></div>
            <button class="btn action-btn" id="btn-check">PRÜFEN</button>
        </main>

        <main id="result-screen" class="screen hidden">
            <h1 id="result-title">Boot Camp beendet!</h1>
            <p>Dein Score: <span id="final-score">0</span></p>
            <button class="btn primary-btn" onclick="location.reload()">Hauptmenü</button>
        </main>

        <footer id="branding-footer">created by Mr. T.</footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
