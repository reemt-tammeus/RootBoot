<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>RootBoot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        
        <header id="top-bar" class="hidden">
            <div id="lives-container">❤️❤️❤️</div>
            <div id="score-container">Score: <span id="score">0</span></div>
        </header>

        <main id="start-screen" class="screen active">
            <div class="menu-buttons-overlay">
                <button class="btn primary-btn" id="btn-start-drill">Drill-Mode (Sorting)</button>
                <button class="btn secondary-btn" id="btn-start-ap">AP-Mode (Typing)</button>
            </div>
        </main>

        <main id="drill-screen" class="screen hidden">
            <div id="drill-sorting-container">
                <button class="drop-zone" onclick="checkSort('noun')">Nouns</button>
                <button class="drop-zone" onclick="checkSort('verb')">Verbs</button>
                <button class="drop-zone" onclick="checkSort('adjective')">Adjectives</button>
                <button class="drop-zone" onclick="checkSort('adverb')">Adverbs</button>
            </div>
            <div id="active-word-area">
                <p class="label">Kategorie wählen für:</p>
                <h2 id="current-tap-word">---</h2>
            </div>
        </main>

        <main id="task-screen" class="screen hidden">
            <div class="text-box" id="task-display">...</div>
            
            <div class="input-section">
                <p class="label" id="task-hint">Stammwort: <strong>-</strong></p>
                <input type="text" id="task-input" class="app-input" readonly tabindex="-1" inputmode="none" placeholder="...">
            </div>

            <div id="app-keyboard" class="keyboard"></div>
        </main>

        <main id="result-screen" class="screen hidden">
            <h1 id="result-title">Beendet!</h1>
            <p>Dein Endergebnis: <span id="final-score">0</span></p>
            <button class="btn primary-btn" onclick="location.reload()">Hauptmenü</button>
        </main>

    </div>

    <script src="app.js"></script>
</body>
</html>
